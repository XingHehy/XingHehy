name: 📊 Auto Update GitHub Stats Cards

on:
  schedule:
    - cron: "0 0 * * *"  # 每天自动更新
  workflow_dispatch:     # 可手动触发

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      # 生成 统计卡片
      - name: Generate stats
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: stats
          options: 'username=${{ github.repository_owner }}&show_icons=true&theme=tokyonight&hide_border=true&bg_color=0A0F1C&title_color=00F0FF&icon_color=00F0FF&text_color=CDEFFF'
          path: profile/stats.svg
          token: ${{ secrets.GH_PAT }}

      # 生成 连续提交卡片
      - name: Generate streak
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: streak
          options: 'user=${{ github.repository_owner }}&theme=tokyonight&hide_border=true&background=0A0F1C&stroke=00F0FF&ring=00F0FF&fire=00F0FF&currStreakLabel=00F0FF&sideLabels=CDEFFF'
          path: profile/streak.svg
          token: ${{ secrets.GH_PAT }}

      # 生成 语言卡片
      - name: Generate top langs
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: top-langs
          options: 'username=${{ github.repository_owner }}&layout=compact&theme=tokyonight&hide_border=true&bg_color=0A0F1C&title_color=00F0FF&text_color=CDEFFF'
          path: profile/top-langs.svg
          token: ${{ secrets.GH_PAT }}

      # 提交并推送
      - name: 🚀 Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "📊 Update local stats cards" || exit 0
          git push
